<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研究代碼查詢系統</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 50px 40px;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #999;
      font-size: 14px;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-search {
      background: #667eea;
      color: white;
    }

    .btn-search:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-search:active {
      transform: translateY(0);
    }

    .btn-clear {
      background: #f0f0f0;
      color: #666;
    }

    .btn-clear:hover {
      background: #e0e0e0;
    }

    .result {
      margin-top: 30px;
      padding: 24px;
      border-radius: 8px;
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result.show {
      display: block;
    }

    .result.success {
      background: #f0f7ff;
      border-left: 4px solid #667eea;
    }

    .result.error {
      background: #fff5f5;
      border-left: 4px solid #ff6b6b;
    }

    .result-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .result.success .result-title {
      color: #667eea;
    }

    .result.error .result-title {
      color: #ff6b6b;
    }

    .result-item {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
      font-size: 15px;
    }

    .result-item:last-child {
      margin-bottom: 0;
    }

    .result-label {
      color: #666;
      font-weight: 600;
    }

    .result-value {
      color: #333;
      font-weight: 600;
    }

    .result.success .result-value {
      color: #667eea;
    }

    .result-code {
      font-size: 18px !important;
      color: #667eea !important;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f0f0f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 8px;
      font-size: 14px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 研究代碼查詢</h1>
    <p class="subtitle">輸入你的學號即可查詢</p>

    <div class="form-group">
      <label for="studentId">學號</label>
      <input
        type="text"
        id="studentId"
        placeholder="例如: B14501139"
        autocomplete="off"
      >
    </div>

    <div class="button-group">
      <button class="btn-search" onclick="search()">查詢</button>
      <button class="btn-clear" onclick="clear()">清除</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">載入中...</div>
    </div>

    <div class="result" id="result">
      <div class="result-title" id="resultTitle"></div>
      <div class="result-item">
        <span class="result-label">姓名</span>
        <span class="result-value" id="resultName"></span>
      </div>
      <div class="result-item">
        <span class="result-label">課程</span>
        <span class="result-value" id="resultCourse"></span>
      </div>
      <div class="result-item">
        <span class="result-label">研究代碼</span>
        <span class="result-value result-code" id="resultCode"></span>
      </div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1QMf6oOl72yN7FwesBUM8RMfSFhzG0Qv3t9NdMO1vz1Y';
    const GID = '2019104007';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

    let data = [];
    let headers = [];

    function loadData() {
      Papa.parse(CSV_URL, {
        download: true,
        header: false,
        skipEmptyLines: true,
        complete: function(results) {
          data = results.data.slice(1);
          headers = results.data[0];
        },
        error: function() {
          console.error('無法載入資料');
        }
      });
    }

    function findColumnIndex(keywords) {
      for (let i = 0; i < headers.length; i++) {
        for (let kw of keywords) {
          if (headers[i].includes(kw)) {
            return i;
          }
        }
      }
      return -1;
    }

    function search() {
      const studentId = document.getElementById('studentId').value.trim().toUpperCase();
      const resultDiv = document.getElementById('result');
      const loading = document.getElementById('loading');

      if (!studentId) {
        alert('請輸入學號');
        return;
      }

      if (data.length === 0) {
        loading.classList.add('show');
        loadData();
        setTimeout(() => performSearch(studentId, resultDiv, loading), 1000);
      } else {
        performSearch(studentId, resultDiv, loading);
      }
    }

    function performSearch(studentId, resultDiv, loading) {
      loading.classList.remove('show');

      const idIndex = findColumnIndex(['學號', 'Student ID']);
      const nameIndex = findColumnIndex(['姓名', 'Name']);
      const codeIndex = findColumnIndex(['研究代碼']);
      const courseIndex = findColumnIndex(['課程', 'Course']);

      for (let row of data) {
        if (row[idIndex] && row[idIndex].trim().toUpperCase() === studentId) {
          document.getElementById('resultTitle').textContent = '✓ 查詢成功';
          document.getElementById('resultName').textContent = row[nameIndex] || '-';
          document.getElementById('resultCourse').textContent = row[courseIndex] || '-';
          document.getElementById('resultCode').textContent = row[codeIndex] || '-';
          resultDiv.classList.remove('error');
          resultDiv.classList.add('success', 'show');
          return;
        }
      }

      document.getElementById('resultTitle').textContent = '✗ 查無資料';
      document.getElementById('resultName').textContent = '-';
      document.getElementById('resultCourse').textContent = '-';
      document.getElementById('resultCode').textContent = '-';
      resultDiv.classList.remove('success');
      resultDiv.classList.add('error', 'show');
    }

    function clear() {
      document.getElementById('studentId').value = '';
      document.getElementById('result').classList.remove('show');
      document.getElementById('studentId').focus();
    }

    document.getElementById('studentId').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') search();
    });

    window.addEventListener('load', loadData);
  </script>
</body>
</html>
